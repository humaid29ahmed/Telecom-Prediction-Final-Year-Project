<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Application</title>
</head>
<body>
    <h1>My Django Application</h1>
    <hr>
    {% if result %}
    <h1>Flower that you are Trying Classify is {{result}}</h1>
    {% endif%}
    <form action="" method ="POST">
        {% csrf_token %}
        Sepal_length: <input type="number" name="sepal_length" required><br>
        Sepal_width: <input type="number" name="sepal_width" required><br>
        Petal_length: <input type="number" name="petal_length" required><br>
        Petal_width: <input type="number" name="petal_width" required><br>
        <input type="submit">
    </form>
</body>
</html>
